server {
    listen       80;
    listen  [::]:80;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # Hide Nginx version in headers and error pages
    server_tokens off;

    # -------------------------------------------------------
    # Gzip compression
    # -------------------------------------------------------
    gzip                on;
    gzip_vary           on;
    gzip_proxied        any;
    gzip_comp_level     6;
    gzip_min_length     1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        font/woff
        font/woff2
        application/font-woff
        application/font-woff2;

    # -------------------------------------------------------
    # Security headers
    # -------------------------------------------------------
    add_header X-Frame-Options           "SAMEORIGIN"                        always;
    add_header X-Content-Type-Options    "nosniff"                           always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"   always;
    add_header X-XSS-Protection          "1; mode=block"                     always;

    # -------------------------------------------------------
    # Cache control
    # Vite outputs content-hashed assets under /assets/ —
    # these can be cached indefinitely (immutable).
    # HTML files must never be cached so deployments take
    # effect immediately.
    # -------------------------------------------------------
    location ~* ^/assets/ {
        expires    1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location ~* \.(css|js|woff2?|ttf|eot|ico|png|jpg|jpeg|gif|svg|webp)$ {
        expires    30d;
        add_header Cache-Control "public";
        access_log off;
    }

    location ~* \.html$ {
        expires    -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # -------------------------------------------------------
    # Routing — Multi-Page App
    # Try exact file, then directory index, then .html suffix.
    # Falls back to index.html for unknown URLs (so visitors
    # land on the homepage rather than a raw Nginx 404).
    # -------------------------------------------------------
    location / {
        try_files $uri $uri/ $uri.html =404;
    }

    # Custom 404 page
    error_page 404 /404.html;
    location = /404.html {
        internal;
    }
}
