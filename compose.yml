services:
  web:
    image: ghcr.io/decorum-experience/cretecnewwebsite:dev
    pull_policy: always
    restart: unless-stopped
    ports:
      - "80"
    depends_on:
      - api

  api:
    image: ghcr.io/decorum-experience/cretec-api:dev
    pull_policy: always
    restart: unless-stopped
    environment:
      - PORT=3001
      - RESEND_API_KEY=${RESEND_API_KEY}
      - CONTACT_FROM=${CONTACT_FROM:-CRETEC Kontaktformular <kontakt@mail.cretec-schiffstechnik.de>}
      - CONTACT_EMAIL=${CONTACT_EMAIL:-service@cretec-schiffstechnik.de}
